---
- name: Check whether uv is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/uv
  register: uv_bin_stat

- name: Install uv (also manages the pinned Python 3.13 the backend requires)
  ansible.builtin.shell: set -o pipefail && curl -LsSf https://astral.sh/uv/install.sh | env UV_INSTALL_DIR=/usr/local/bin sh
  args:
    executable: /bin/bash
  when: not uv_bin_stat.stat.exists
  changed_when: true

- name: Sync backend dependencies (installs Python 3.13 via uv if needed)
  ansible.builtin.command: /usr/local/bin/uv sync --locked
  args:
    chdir: "{{ app_dir }}/backend"
  become: true
  become_user: "{{ app_user }}"
  environment:
    UV_CACHE_DIR: "/home/{{ app_user }}/.cache/uv"
  register: uv_sync
  changed_when: "'Installed' in uv_sync.stdout or 'Installed' in uv_sync.stderr"
  notify:
    - restart backend

- name: Write backend/.env
  ansible.builtin.template:
    src: backend.env.j2
    dest: "{{ app_dir }}/backend/.env"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0600"
  notify:
    - restart backend

- name: Install systemd unit for the backend
  ansible.builtin.template:
    src: contoso-backend.service.j2
    dest: /etc/systemd/system/contoso-backend.service
    mode: "0644"
  notify:
    - reload systemd
    - restart backend

- name: Enable and start the backend service
  ansible.builtin.systemd:
    name: contoso-backend
    enabled: true
    state: started
    daemon_reload: true
