---
- name: Check whether Node.js is already installed
  ansible.builtin.command: node --version
  register: node_version_check
  changed_when: false
  failed_when: false

- name: Add NodeSource apt repo for Node.js {{ node_major_version }}
  ansible.builtin.shell: set -o pipefail && curl -fsSL https://deb.nodesource.com/setup_{{ node_major_version }}.x | bash -
  args:
    executable: /bin/bash
  when: >
    node_version_check.rc != 0 or
    not node_version_check.stdout.startswith('v' + node_major_version | string)
  changed_when: true

- name: Install Node.js
  ansible.builtin.apt:
    name: nodejs
    state: present

- name: Install frontend npm dependencies
  ansible.builtin.command: npm ci
  args:
    chdir: "{{ app_dir }}/frontend"
  become: true
  become_user: "{{ app_user }}"
  register: npm_ci
  changed_when: "'added' in npm_ci.stdout or 'removed' in npm_ci.stdout"

- name: Build the frontend
  ansible.builtin.command: npm run build
  args:
    chdir: "{{ app_dir }}/frontend"
  become: true
  become_user: "{{ app_user }}"
  changed_when: true
  environment:
    # Same-origin, relative API base — nginx's /api/ location proxies this to
    # the backend (see roles/nginx), so no CORS and no hardcoded domain here.
    VITE_API_BASE: /api

- name: Make the built assets readable by nginx (www-data)
  ansible.builtin.file:
    path: "{{ app_dir }}/frontend/dist"
    state: directory
    recurse: true
    mode: "u=rwX,g=rX,o=rX"
