apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: contoso
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      # Local-cluster only: image is built and loaded into the cluster's
      # own image store (minikube image load / kind load docker-image),
      # never pulled from a registry. See k8s/README.md.
      initContainers:
        - name: wait-for-backend
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z backend 8000; do echo waiting for backend; sleep 2; done"]
      containers:
        - name: frontend
          image: contoso-frontend:local
          imagePullPolicy: Never
          ports:
            - containerPort: 5173
          readinessProbe:
            tcpSocket:
              port: 5173
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: contoso
spec:
  selector:
    app: frontend
  ports:
    - port: 5173
      targetPort: 5173