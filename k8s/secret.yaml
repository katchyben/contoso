# Dev-only placeholder secrets for local k8s. Do not reuse these values
# outside a local cluster -- edit in place (or manage via `kubectl create secret`
# / a secrets manager) before pointing this at anything shared.
apiVersion: v1
kind: Secret
metadata:
  name: contoso-secrets
  namespace: contoso
type: Opaque
stringData:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  JWT_SECRET_KEY: dev-only-secret-do-not-use-in-production
  GOOGLE_API_KEY: ""
  MINIO_ROOT_USER: minioadmin
  MINIO_ROOT_PASSWORD: minioadmin
  S3_ACCESS_KEY_ID: minioadmin
  S3_SECRET_ACCESS_KEY: minioadmin